  <!-- ?v= 캐시버스트: CSS도 버전 범프 시 함께 올려 새 스타일이 즉시 반영되게 함(하드리프레시 불필요) -->

  <link rel="stylesheet" href="css/inspector.css?v=1.0.0" />

</head>
<body>
  <!-- ===== APP SHELL (DESIGN §7 three-panel skeleton) ===== -->
  <div class="app">
    <!-- ----- LEFT: tools (V/R now; more shapes land later) ----- -->
    <aside class="panel panel-left" id="panel-left">
      <div class="tool-list" id="tool-list">
        <!-- 과목 선택: 강조색·배경 톤 테마와 '과목별 오브젝트' 파트가 함께 전환된다 -->
        <select id="subject-select" class="subject-select subject-select-panel" aria-label="과목 선택">
          <option value="p">물리학</option>
          <option value="c">화학</option>
          <option value="b">생명과학</option>
          <option value="e">지구과학</option>
        </select>
        <div class="tool-section">
          <div class="tool-section-header">공통 도구 <span class="toggle-icon">▾</span></div>
          <!-- 공통 도구 그리드(3열). 순서는 사용자 지정(선택/회전/자르기 → 도형 → 선 →
               자유그리기/텍스트/라벨러 → 함수/점 → 각도호/직각). 뒤쪽 5개(라벨러·함수·
               점·각도호·직각)는 data-symbol을 달아 templates.js의 심볼 활성화 경로를
               그대로 탄다(클릭은 #tool-list [data-symbol] 위임). initTemplates는
               category:"공통" 심볼을 팔레트에 다시 그리지 않는다(중복 방지). -->
          <div class="tool-section-body">
            <!-- 1줄: 선택 / 회전 / 자르기 -->
            <button class="tool-btn" type="button" data-tool="V" title="선택 (V)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 3 L4 15.5 L7.5 12 L9.8 16.5 L11.7 15.6 L9.4 11.2 L14.5 11 Z"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="rotate" title="회전 (R)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5.5 A6.5 6.5 0 1 0 16.5 10"/><polyline points="14,3 16.5,5.5 14,8"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="CUT" title="자르기 (E)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="5" cy="14" r="2.2"/><circle cx="5" cy="6" r="2.2"/><line x1="6.9" y1="12.8" x2="17" y2="5"/><line x1="6.9" y1="7.2" x2="17" y2="15"/></svg></kbd>
            </button>
            <!-- 2줄: 타원 / 삼각형 / 사각형 -->
            <button class="tool-btn" type="button" data-tool="O" title="타원 (O)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="10" cy="10" rx="7" ry="5"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="Y" title="직각삼각형 (Y)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.5 4 L4.5 15.5 L16 15.5 Z"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="RECT" title="사각형 (S)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5.5" width="13" height="9"/></svg></kbd>
            </button>
            <!-- 3줄: 직선 / 꺾은선 / 곡선 -->
            <button class="tool-btn" type="button" data-tool="L" title="직선 (L)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4.5" y1="15.5" x2="15.5" y2="4.5"/><circle cx="4.5" cy="15.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="15.5" cy="4.5" r="1.2" fill="currentColor" stroke="none"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="P" title="꺾은선 (P)" aria-label="꺾은선 (P)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3.5,14 7.5,6.5 12,12.5 16.5,5.5"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="C" title="곡선 (C)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5,14 C5,4 9,4 10,10 S15,16 16.5,6"/></svg></kbd>
            </button>
            <!-- 4줄: 자유그리기 / 텍스트·라벨러(통합) / 각도·직각(통합).
                 통합 버튼(#tool-*-merged)은 누르면 아래 .tool-chooser 팝오버가 떠 둘 중 하나를 고른다.
                 아이콘은 각각 텍스트·각도호로 통일, 단축키는 그대로(T/Shift+T, A/Shift+A). 실제 도구를
                 켜는 버튼(data-tool/data-symbol)은 팝오버 안에 남아 있어 단축키 querySelector가 그대로 찾는다. -->
            <button class="tool-btn" type="button" data-tool="F" title="자유 그리기 (D)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 13 C5 7 7 6 8.5 9.5 S11.5 15.5 13.5 11 C14.5 8.8 16 9 16.5 11"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" id="tool-text-merged" aria-haspopup="true"
                    title="텍스트 (T) — 자유 텍스트&#10;라벨러 (Shift+T) — 지시선 + 이름표" aria-label="텍스트 / 라벨러">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="5" x2="16" y2="5"/><line x1="10" y1="5" x2="10" y2="16"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" id="tool-angle-merged" aria-haspopup="true"
                    title="각도 호 (A)&#10;직각 표시 (Shift+A)" aria-label="각도 / 직각">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" aria-hidden="true"><path d="M4 16 L4 5 M4 16 L15 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 16 A4 4 0 0 0 4 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><text x="8.8" y="12.8" font-size="6" font-family="serif" fill="currentColor">θ</text></svg></kbd>
            </button>
            <!-- 5줄: 점 / 자 / 각도기 (통합으로 자리가 나 자·각도기를 점 옆으로 — 요구) -->
            <button class="tool-btn" type="button" data-symbol="node" title="점 (N)" aria-label="점 (N)">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="3" fill="currentColor" stroke="none"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="RULER" title="자 (드래그로 생성)" aria-label="자">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="7" width="15" height="6"/><line x1="5.5" y1="7" x2="5.5" y2="10"/><line x1="8.5" y1="7" x2="8.5" y2="10"/><line x1="11.5" y1="7" x2="11.5" y2="10"/><line x1="14.5" y1="7" x2="14.5" y2="10"/></svg></kbd>
            </button>
            <button class="tool-btn" type="button" data-tool="PROTRACTOR" title="각도기 (드래그로 생성)" aria-label="각도기">
              <kbd><svg class="tool-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 14 A7 7 0 0 1 17 14 Z"/><line x1="10" y1="14" x2="10" y2="8"/><line x1="6.4" y1="9.1" x2="7.7" y2="10.6"/><line x1="13.6" y1="9.1" x2="12.3" y2="10.6"/></svg></kbd>
            </button>

            <!-- 통합 선택 팝오버(그리드 밖, position:fixed). 안의 버튼이 진짜 도구를 켠다
                 (data-tool=setupButtons / data-symbol=#tool-list 위임). 숨겨져 있어도 단축키가
                 querySelector로 찾아 click()하므로 T/Shift+T/A/Shift+A가 그대로 작동한다. -->
            <div class="tool-chooser" id="chooser-text" hidden role="menu" aria-label="텍스트 / 라벨러 선택">
              <button class="tool-chooser-opt" type="button" data-tool="T" role="menuitem">
                <span class="chooser-ico"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="5" x2="16" y2="5"/><line x1="10" y1="5" x2="10" y2="16"/></svg></span>
                <span class="chooser-txt"><b>텍스트</b><small>자유 텍스트 (T)</small></span>
              </button>
              <button class="tool-chooser-opt" type="button" data-symbol="labeler" role="menuitem">
                <span class="chooser-ico"><svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 17 L10 8" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="3" cy="17" r="1.4" fill="currentColor"/><text x="13.5" y="8.5" font-size="9" font-family="serif" text-anchor="middle" dominant-baseline="middle" fill="currentColor">㉠</text></svg></span>
                <span class="chooser-txt"><b>라벨러</b><small>지시선 + 이름표 (Shift+T)</small></span>
              </button>
            </div>
            <div class="tool-chooser" id="chooser-angle" hidden role="menu" aria-label="각도 / 직각 선택">
              <button class="tool-chooser-opt" type="button" data-symbol="anglearc" role="menuitem">
                <span class="chooser-ico"><svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 16 L4 5 M4 16 L15 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 16 A4 4 0 0 0 4 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><text x="8.8" y="12.8" font-size="6" font-family="serif" fill="currentColor">θ</text></svg></span>
                <span class="chooser-txt"><b>각도</b><small>각도 호 (A)</small></span>
              </button>
              <button class="tool-chooser-opt" type="button" data-symbol="rightangle" role="menuitem">
                <span class="chooser-ico"><svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 4 L5 15 L16 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 11 L9 11 L9 15" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                <span class="chooser-txt"><b>직각</b><small>직각 표시 (Shift+A)</small></span>
              </button>
            </div>
          </div>
        </div>
        <!-- ===== 과목별 오브젝트: 과목 선택 → 파트별 라이브러리(현재는 빈 자리) =====
             과목 선택에 따라 :root[data-subject]가 바뀌어 강조색 테마가 전환된다.
             파트 아코디언 본문은 아직 비어 있고(구현 예정), 기본은 접힘. subject-objects.js가 채운다. -->
        <div class="tool-section is-collapsed" id="subject-section">
          <div class="tool-section-header">과목별 오브젝트 <span class="toggle-icon">▾</span></div>
          <div class="tool-section-body tool-section-body-wide">
            <div id="subject-parts"></div>
          </div>
        </div>
        <!-- 심볼 라이브러리는 '과목별 오브젝트' 파트 아코디언(#subject-parts)으로 흡수됨
             (subject-objects.js가 templates.js 카테고리를 새 분류로 렌더). -->
        <!-- 퍼스널 오브젝트: 사용자가 저장한 오브젝트 묶음 라이브러리 (personal-objects.js) -->
        <div class="tool-section is-collapsed" id="personal-section">
          <div class="tool-section-header">퍼스널 오브젝트 <span class="toggle-icon">▾</span></div>
          <div class="tool-section-body tool-section-body-wide">
            <div id="personal-parts"><p class="subject-part-empty">저장된 오브젝트가 없습니다.</p></div>
          </div>
        </div>
        <div class="tool-section">
          <div class="tool-section-header">고급 기능 <span class="toggle-icon">▾</span></div>
          <div class="tool-section-body tool-section-body-wide">
            <button id="image-objectify-open" class="advanced-tool-btn" type="button"
                    title="이미지 객체화 (Ctrl+T)">이미지 객체화</button>
            <button id="personal-object-save" class="advanced-tool-btn" type="button"
                    title="선택한 오브젝트를 퍼스널 오브젝트로 저장 (좌측 라이브러리에 추가)">오브젝트 저장</button>
            <button id="bulk-edit-open" class="advanced-tool-btn" type="button"
                    title="선택(없으면 전체) 오브젝트의 굵기·색·글씨·각도·잠금을 한 번에 통일하거나 증감">전체 통일/수정</button>
            <button id="graph-tool-open" class="advanced-tool-btn" type="button"
                    title="좌표평면 + 함수·직선·꺾은선·곡선을 만드는 그래프 도구 (F 단축키)">좌표/함수 생성</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- ----- CENTER: canvas (the only working panel in 1A) ----- -->
    <main class="panel panel-center">
      <div class="canvas-toolbar">
        <!-- 모바일 드로어 토글 (데스크톱에선 CSS로 숨김) -->
        <button id="drawer-left-toggle" class="topbar-btn drawer-toggle" type="button"
                aria-controls="panel-left" aria-expanded="false" title="도구 패널 열기">☰ 도구</button>
        <button id="drawer-right-toggle" class="topbar-btn drawer-toggle" type="button"
                aria-controls="panel-right" aria-expanded="false" title="속성 패널 열기">속성</button>
        <a class="app-brand" href="https://seungyeon980808-pixel.github.io/personal_site/projects/physics-draw.html"
           target="_blank" rel="noopener" title="5E (sciEnceEducationalExamEasyEditor) · 기능 안내 페이지">5E</a>
        <span class="tb-sep" aria-hidden="true"></span>
        <!-- Undo / Redo (icon-only; sit immediately left of 파일) -->
        <button id="undo-btn" class="topbar-btn icon-btn" type="button"
                title="되돌리기 (Ctrl+Z)" aria-label="되돌리기" disabled>↶</button>
        <button id="redo-btn" class="topbar-btn icon-btn" type="button"
                title="다시 실행 (Ctrl+Shift+Z)" aria-label="다시 실행" disabled>↷</button>
        <span class="tb-sep" aria-hidden="true"></span>
        <!-- 파일 dropdown: project I/O (JSON) + image export (PNG/SVG) -->
        <div class="file-menu">
          <button id="file-menu-btn" class="topbar-btn" type="button"
                  aria-haspopup="true" aria-expanded="false" title="파일">파일 ▾</button>
          <div id="file-menu-list" class="file-menu-list" role="menu" hidden>
            <button id="project-save" class="file-menu-item" type="button" role="menuitem"
                    data-desc="현재 작업을 나중에 다시 편집할 수 있는 프로젝트 파일로 저장합니다.">프로젝트 저장 <span class="menu-kbd">Ctrl+S</span></button>
            <button id="project-open" class="file-menu-item" type="button" role="menuitem"
                    data-desc="저장해 둔 프로젝트 파일을 열어 이어서 편집합니다.">프로젝트 불러오기</button>
            <button id="image-import" class="file-menu-item file-menu-parent" type="button" role="menuitem"
                    aria-haspopup="true" aria-expanded="false"

            <div id="file-menu-desc" class="file-menu-desc">파일 작업을 선택하세요.</div>

            <button id="settings-import" class="file-menu-item" type="button" role="menuitem"
                    data-desc="저장해 둔 백업 파일을 불러와 설정·라이브러리·프로젝트를 복원합니다.">불러오기 (복원)</button>
            <button id="open-shortcuts" class="file-menu-item" type="button" role="menuitem" disabled

            <div id="settings-menu-desc" class="file-menu-desc">설정 작업을 선택하세요.</div>
          </div>
        </div>
        <span id="zoom-readout" class="zoom-readout">zoom 1.00×</span>
        <button id="fullscreen-toggle" class="topbar-btn fullscreen-toggle" type="button"
                title="전체화면 (Alt+Enter)" aria-label="전체화면" aria-pressed="false">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M3.5 7V3.5H7M13 3.5h3.5V7M16.5 13v3.5H13M7 16.5H3.5V13" />
          </svg>
        </button>
        <button id="theme-toggle" class="topbar-btn icon-btn theme-toggle" type="button" title="흑백 모드 끄기" aria-label="흑백 모드 끄기" aria-pressed="true">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="1.5" />
            <path d="M10 3.5a6.5 6.5 0 0 1 0 13z" fill="currentColor" />

      <div class="canvas-wrap">
        <!-- ruler-container: CSS grid — corner | h-ruler / v-ruler | canvas -->
        <div class="ruler-container" id="ruler-container">
          <div class="ruler-corner"></div>
          <canvas id="ruler-h" class="ruler ruler-h"></canvas>
          <canvas id="ruler-v" class="ruler ruler-v"></canvas>
          <!-- viewBox is the single coordinate authority (DESIGN 1-2) -->
          <svg
            id="canvas"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 100 100"
            preserveAspectRatio="xMidYMid meet"
          >
            <!-- render.js paints state.objects into this group -->
            <g id="scene"></g>
          </svg>
        </div>
      </div>

      <!-- ===== PAGE TAB BAR: 다중 아트보드 페이지 탭(추가/복제/순서/삭제 + 문항 메타) =====
           내용은 js/pages.js가 채운다(마크업 최소화). -->
      <div class="page-tab-bar" id="page-tab-bar"></div>

      <!-- ===== CANVAS BOTTOM BAR: 검색 · 격자 토글(+세부) · 중앙 정렬 ===== -->
      <div class="canvas-bottom-bar">
        <button class="object-search-trigger" type="button" id="object-search-trigger"
                title="오브젝트 검색 (Ctrl+F)" aria-label="오브젝트 검색 (Ctrl+F)">
          <svg class="search-trigger-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.8" y1="12.8" x2="17" y2="17"/></svg>
          <span class="search-trigger-label">오브젝트 검색</span>
        </button>
        <button class="object-search-trigger" type="button" id="exam-library-open"
                title="기출문항 검색 (Ctrl+Shift+F)" aria-label="기출문항 검색 (Ctrl+Shift+F)">
          <svg class="search-trigger-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="14" height="14" rx="2"/><line x1="6.5" y1="7" x2="13.5" y2="7"/><line x1="6.5" y1="10" x2="13.5" y2="10"/><line x1="6.5" y1="13" x2="10.5" y2="13"/></svg>
          <span class="search-trigger-label">기출문항 검색</span>
        </button>
        <!-- 격자: 토글 버튼 — 켰을 때만 진하기/간격이 나타남. 눈금자는 항상 켜짐(토글 제거) -->
        <button id="grid-btn" class="grid-toggle-btn" type="button" aria-pressed="false"
                title="격자 켜기/끄기">격자</button>
        <span id="grid-detail" class="grid-detail" hidden>
          <label>
            진하기
            <input type="range" id="grid-opacity" min="1" max="10" value="3" />
          </label>
          <label>
            간격
            <input type="number" id="grid-interval" min="5" max="50" step="5" value="10" />
            mm
          </label>
        </span>
        <button id="center-view-btn" type="button" aria-pressed="false"
                title="중앙 고정 (Ctrl+Space) · 스페이스바 탭 = 중앙으로 복귀">⌖</button>
      </div>
    </main>

    <!-- ----- RIGHT: inspector ----- -->
    <aside class="panel panel-right" id="panel-right">
      <div id="inspector-resize"></div>
      <div id="inspector">
        <div id="inspector-empty">선택된 오브젝트 없음</div>
        <div id="inspector-content" style="display:none">
          <!-- sections injected by inspector.js -->
        </div>
      </div>
    </aside>

    <!-- 모바일 드로어 열림 시 캔버스 위에 깔리는 반투명 배경 (데스크톱에선 CSS로 숨김) -->
    <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
  </div>

  <!-- ===== FOOTER: product/version (left) · developer credit (right) ===== -->
  <footer class="app-footer">
    <span class="app-footer-main">5E (sciEnceEducationalExamEasyEditor) · 과학 교사를 위한 시험문제 그림 제작 도구 · <strong>v1.0.0</strong> · 2026-07-13</span>
    <span class="app-footer-credit">Developed by <strong>박승연</strong> | SMOE</span>
  </footer>

  <!-- ===== MODULES (load order matters: store → state → viewport → render → main) ===== -->
  <!-- ?v= busts the ES-module cache so edits actually load (DESIGN: cache-bust) -->
  <!-- ===== MOBILE DRAWER TOGGLES =====
       좁은 화면(<768px)에서 좌/우 사이드 패널을 오버레이 드로어로 열고 닫는다.
       순수 DOM 토글이라 ES 모듈 그래프를 건드리지 않고 인라인 IIFE로 처리(브랜치 복사 버튼과 동일 방식). -->
  <script>
    (() => {
      const leftPanel = document.getElementById("panel-left");
      const rightPanel = document.getElementById("panel-right");
      const backdrop = document.getElementById("drawer-backdrop");
      const leftBtn = document.getElementById("drawer-left-toggle");
      const rightBtn = document.getElementById("drawer-right-toggle");
      if (!leftPanel || !rightPanel || !backdrop || !leftBtn || !rightBtn) return;

      const mq = window.matchMedia("(max-width: 767px)");

      function closeAll() {
        leftPanel.classList.remove("is-open");
        rightPanel.classList.remove("is-open");
        backdrop.classList.remove("is-open");
        backdrop.hidden = true;
        leftBtn.setAttribute("aria-expanded", "false");
        rightBtn.setAttribute("aria-expanded", "false");
      }

      function openPanel(panel, btn, otherPanel, otherBtn) {
        // 한 번에 하나만 열어 두 드로어가 겹치지 않게 한다
        otherPanel.classList.remove("is-open");
        otherBtn.setAttribute("aria-expanded", "false");
        panel.classList.add("is-open");
        btn.setAttribute("aria-expanded", "true");
        backdrop.hidden = false;
        backdrop.classList.add("is-open");
      }

      function toggle(panel, btn, otherPanel, otherBtn) {
        if (panel.classList.contains("is-open")) closeAll();
        else openPanel(panel, btn, otherPanel, otherBtn);
      }

      leftBtn.addEventListener("click", () => toggle(leftPanel, leftBtn, rightPanel, rightBtn));
      rightBtn.addEventListener("click", () => toggle(rightPanel, rightBtn, leftPanel, leftBtn));
      backdrop.addEventListener("click", closeAll);

      // 좌측 드로어에서 도구/심볼을 고르면 바로 캔버스를 보도록 닫아 준다
      leftPanel.addEventListener("click", (e) => {
        if (e.target.closest("[data-tool],[data-symbol],#object-search-trigger")) closeAll();
      });

      // Esc로 열린 드로어 닫기(열려 있을 때만 가로채 앱의 다른 Esc 동작과 충돌 방지)
      window.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (leftPanel.classList.contains("is-open") || rightPanel.classList.contains("is-open")) {
          closeAll();
          e.stopPropagation();
        }
      }, true);

      // 데스크톱 폭으로 돌아오면 드로어 상태를 초기화해 그리드 레이아웃으로 복귀
      mq.addEventListener("change", (e) => { if (!e.matches) closeAll(); });
    })();
  </script>
  <!-- 모바일: 캔버스 터치를 마우스 이벤트로 변환(그리기·이동). 모듈 그래프 밖 독립 스크립트. -->
  <script src="js/touch-drag.js?v=1.0.0"></script>
  <script type="module" src="js/main.js?v=1.0.0"></script>
</body>
